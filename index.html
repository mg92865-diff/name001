<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Detail List</title>
    <style>

    <!-- This targets all buttons and makes them easier to press on mobile -->
button {
  padding: 12px 20px; <!--Adds vertical and horizontal space inside the button -->
  font-size: 16px;    <!-- Prevents iOS from zooming in on inputs -->
  margin: 5px;        <!-- Keeps buttons from touching each other -->
  touch-action: manipulation; <!--Optimizes for mobile tapping -->
  border-radius: 8px; <!--Makes them look more like modern app buttons -->
}

<!-- Optional: Make buttons full-width on small screens -->
@media (max-width: 600px) {
  .my-button-class { 
    width: 100%;
    margin-bottom: 10px;
  }
   
} 
    </style>
</head>
<body>

<!-- MASTER VIEW -->
<div id="masterView">
    <input type="text" id="nameInput" placeholder="Enter name">
    <input type="number" id="ageInput" placeholder="Enter age">
    <button id="addBtn">Add</button>

    <ul id="nameList"></ul>
</div>

<!-- DETAIL VIEW -->
<div id="detailView" style="display:none;">
    <input type="text" id="editName">
    <input type="number" id="editAge">

    <button id="saveBtn">Save</button>
    <button id="deleteOneBtn">Delete</button>
    <button id="backBtn">Back</button>
</div>

<script src="app.js"></script>

</body>
</html>
